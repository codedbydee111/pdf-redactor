<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>

  <!-- Document shape -->
  <g transform="translate(126, 72)">
    <!-- Page body -->
    <rect x="0" y="0" width="260" height="368" rx="16" fill="rgba(255,255,255,0.95)"/>

    <!-- Folded corner -->
    <path d="M200 0 L260 60 L200 60 Z" fill="rgba(255,255,255,0.6)"/>
    <path d="M200 0 L260 60 L200 60 Z" fill="rgba(79,70,229,0.12)"/>

    <!-- Text lines -->
    <rect x="32" y="44" width="120" height="8" rx="4" fill="rgba(79,70,229,0.15)"/>
    <rect x="32" y="64" width="160" height="8" rx="4" fill="rgba(79,70,229,0.10)"/>

    <!-- Redaction bars -->
    <rect x="32" y="100" width="196" height="20" rx="4" fill="#1e1b4b" opacity="0.85"/>
    <rect x="32" y="132" width="140" height="20" rx="4" fill="#1e1b4b" opacity="0.85"/>
    <rect x="32" y="164" width="170" height="20" rx="4" fill="#1e1b4b" opacity="0.85"/>

    <!-- More text lines below redactions -->
    <rect x="32" y="208" width="180" height="8" rx="4" fill="rgba(79,70,229,0.10)"/>
    <rect x="32" y="228" width="140" height="8" rx="4" fill="rgba(79,70,229,0.10)"/>
    <rect x="32" y="248" width="196" height="8" rx="4" fill="rgba(79,70,229,0.10)"/>

    <!-- Another redaction bar -->
    <rect x="32" y="280" width="160" height="20" rx="4" fill="#1e1b4b" opacity="0.85"/>

    <!-- Bottom text -->
    <rect x="32" y="324" width="120" height="8" rx="4" fill="rgba(79,70,229,0.10)"/>
    <rect x="32" y="344" width="80" height="8" rx="4" fill="rgba(79,70,229,0.10)"/>
  </g>

  <!-- Shield badge (bottom right) -->
  <g transform="translate(340, 320)">
    <circle cx="60" cy="60" r="60" fill="#3730a3"/>
    <circle cx="60" cy="60" r="56" fill="#4f46e5"/>
    <!-- Shield path -->
    <path d="M60 28 L88 42 L88 64 C88 82 76 96 60 100 C44 96 32 82 32 64 L32 42 Z"
          fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>
    <path d="M48 62 L56 70 L72 54"
          fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
